<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="styles.css">
    <script src="index.js"></script>
</head>

<body>
    <div class="container">
        <div class="section-title">
            <sp-label style="font-weight: bold; font-size: 13px;">오브젝트 간격(Gap)</sp-label>
        </div>
        <div class="gap-container">
                <div class="col">
                    <sp-label class="sub-label" style="font-weight: bold;">가로(px)</sp-label>
                    <input type="number" id="horiz-gap" class="num-input" value="10">
                    <button id="apply-horiz" class="apply-btn">적용</button>
                </div>
                <div class="col">
                    <sp-label class="sub-label">세로(px)</sp-label>
                    <input type="number" id="vert-gap" class="num-input" value="10">
                    <button id="apply-vert" class="apply-btn">적용</button>
                </div>
            </div>
        </div>

        <!-- 기존 회색 구분선 -->
        <div class="divider"></div>

        <!-- Align 메뉴 추가 -->
        <div class="align-section">
            <sp-label style="font-weight: bold; font-size: 13px;">오브젝트 정렬(Align)</sp-label>
            
            <!-- 가로(Horizontal) 정렬 줄 -->
            <div class="align-toolbar">
                <sp-action-button id="align-left" title="왼쪽 정렬" quiet>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#cccccc">
                        <rect x="5" y="4" width="1.5" height="16" rx="0.5" />
                        <rect x="7" y="7" width="10" height="4" rx="1" />
                        <rect x="7" y="13" width="6" height="4" rx="1" />
                    </svg>
                </sp-action-button>
                <sp-action-button id="align-center-h" title="수평 중앙 정렬" quiet>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#cccccc">
                        <rect x="11.25" y="4" width="1.5" height="16" rx="0.5" />
                        <rect x="6" y="7" width="12" height="4" rx="1" />
                        <rect x="8" y="13" width="8" height="4" rx="1" />
                    </svg>
                </sp-action-button>
                <sp-action-button id="align-right" title="오른쪽 정렬" quiet>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#cccccc">
                        <rect x="17" y="4" width="1.5" height="16" rx="0.5" />
                        <rect x="7" y="7" width="9" height="4" rx="1" />
                        <rect x="11" y="13" width="5" height="4" rx="1" />
                    </svg>
                </sp-action-button>
                
                <div class="toolbar-divider"></div>
                
                <sp-action-button id="distribute-h" title="수평 간격 분할" quiet>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#cccccc">
                        <rect x="4" y="4" width="1.5" height="16" rx="0.5" />
                        <rect x="8.5" y="9" width="7" height="6" rx="1" />
                        <rect x="18" y="4" width="1.5" height="16" rx="0.5" />
                    </svg>
                </sp-action-button>
            </div>
            
            <!-- 세로(Vertical) 정렬 줄 -->
            <div class="align-toolbar">
                <sp-action-button id="align-top" title="위쪽 정렬" quiet>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#cccccc">
                        <rect x="4" y="5" width="16" height="1.5" rx="0.5" />
                        <rect x="7" y="7" width="4" height="10" rx="1" />
                        <rect x="13" y="7" width="4" height="6" rx="1" />
                    </svg>
                </sp-action-button>
                <sp-action-button id="align-center-v" title="수직 중앙 정렬" quiet>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#cccccc">
                        <rect x="4" y="11.25" width="16" height="1.5" rx="0.5" />
                        <rect x="7" y="6" width="4" height="12" rx="1" />
                        <rect x="13" y="8" width="4" height="8" rx="1" />
                    </svg>
                </sp-action-button>
                <sp-action-button id="align-bottom" title="아래쪽 정렬" quiet>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#cccccc">
                        <rect x="4" y="17" width="16" height="1.5" rx="0.5" />
                        <rect x="7" y="7" width="4" height="9" rx="1" />
                        <rect x="13" y="10" width="4" height="6" rx="1" />
                    </svg>
                </sp-action-button>

                <div class="toolbar-divider"></div>
                
                <sp-action-button id="distribute-v" title="수직 간격 분할" quiet>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="#cccccc">
                        <rect x="4" y="4" width="16" height="1.5" rx="0.5" />
                        <rect x="9" y="8.5" width="6" height="7" rx="1" />
                        <rect x="4" y="18" width="16" height="1.5" rx="0.5" />
                    </svg>
                </sp-action-button>
            </div>
        </div>

    </div>
</body>

</html>
